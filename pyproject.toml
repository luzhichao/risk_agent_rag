    "pypdf>=6.10.2",
    "pysnowflake>=0.1.3",
    "python-dotenv>=1.2.2",
    "python-jose[cryptography]>=3.5.0",
    "python-multipart>=0.0.27",
    "sqlalchemy[asyncio]>=2.0.49",
    "unstructured[all-docs]>=0.22.27",
