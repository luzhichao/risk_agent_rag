    "booktype>=1.5",
    "chromadb>=1.5.9",
    "dashscope>=1.25.17",
    "dotenv>=0.9.9",
    "fastapi>=0.136.1",
    "httpcore>=1.0.9",
    "ipykernel>=7.2.0",
    "jq>=1.11.0",
    "langchain>=1.2.17",
    "langchain-chroma>=1.1.0",
    "langchain-community>=0.4.1",
    "langchain-core>=1.3.3",
    "langchain-openai>=1.2.1",
    "langchain-tavily>=0.2.18",
    "langchain-text-splitters>=1.1.2",
    "langgraph>=1.1.10",
    "langgraph-checkpoint-redis>=0.4.1",
    "langgraph-sdk>=0.3.14",
